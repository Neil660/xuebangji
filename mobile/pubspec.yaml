name: xuebangji
description: 学榜记 - 学习时长记录与同赛道排行榜

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # 状态管理
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # 导航
  go_router: ^13.1.0

  # 网络请求
  dio: ^5.4.0

  # 本地存储
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2
  sqflite: ^2.3.2
  path: ^1.9.0

  # 图表
  fl_chart: ^0.67.0

  # 后台计时
  flutter_background_service: ^5.0.5
  flutter_background_service_android: ^6.2.2
  flutter_background_service_ios: ^5.0.0

  # 本地通知
  flutter_local_notifications: ^17.1.2

  # Firebase 推送
  firebase_core: ^3.0.0
  firebase_messaging: ^15.0.0

  # 图片相关
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1

  # 网络状态
  connectivity_plus: ^6.0.2

  # 分享
  share_plus: ^9.0.0

  # Excel 导出
  excel: ^4.0.2

  # 文件操作
  path_provider: ^2.1.2
  permission_handler: ^11.3.0

  # 其他工具
  intl: ^0.19.0
  uuid: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  riverpod_generator: ^2.3.9
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
